name: Build Frontend Image

on:
  push:
    branches: [main]
    paths:
      - 'docker/frontend/Dockerfile'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: guybidani/vixy-deerflow-frontend

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: docker/frontend
          file: docker/frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/guybidani/vixy-deerflow-frontend:latest
            ghcr.io/guybidani/vixy-deerflow-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            DEER_FLOW_REF=main
